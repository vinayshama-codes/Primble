name: CI

on:
  push:
    branches: [main, main2]
  pull_request:
    branches: [main, main2]

jobs:
  backend:
    name: Backend — lint, test, migration check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: acordly
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: acordly_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
      ENVIRONMENT: test
      JOB_QUEUE_BACKEND: memory
      SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}
      PYTHONPATH: .

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Skip heavy optional OCR libs (easyocr pulls torch) in CI
          pip install fastapi uvicorn psycopg2-binary bcrypt python-multipart PyJWT \
            google-auth google-auth-oauthlib google-auth-httplib2 stripe \
            pdfplumber pikepdf reportlab Pillow groq APScheduler \
            "pydantic[email]" email-validator python-dotenv redis boto3 ftfy \
            "sentry-sdk[fastapi]" \
            alembic sqlalchemy pytest pytest-asyncio httpx ruff

      - name: Lint with ruff
        run: ruff check . --select=E,F,W --ignore=E501,E402 --exclude=alembic/

      - name: Security scan (Python)
        run: |
          pip install pip-audit bandit
          pip-audit -r requirements.txt --progress-spinner off
          bandit -r . --exclude ./.venv,./alembic -ll -q

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Migration dry-run (SQL only, no DB required)
        run: alembic upgrade --sql head > /dev/null
        env:
          # alembic needs a URL even for --sql mode
          DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}

      - name: Migration apply (real DB)
        run: alembic upgrade head

  frontend:
    name: Frontend — lint, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    env:
      # CI builds in development mode so the localhost guard in vite.config.js
      # does not trigger. The guard only fires on --mode production builds.
      VITE_API_BASE: http://localhost:8000
      VITE_GOOGLE_CLIENT_ID: placeholder-for-ci
      VITE_STRIPE_PORTAL: https://billing.stripe.com/p/login/

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security scan (npm)
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Build (development mode)
        run: npm run build -- --mode development

      - name: Build (production mode)
        run: npm run build -- --mode production
        env:
          VITE_API_BASE: https://api.example.com
          VITE_GOOGLE_CLIENT_ID: placeholder-for-ci
          VITE_STRIPE_PORTAL: https://billing.stripe.com/p/login/
